function pSpent(exps,uid2){var t=0;if(!exps)return 0;var arr=Object.values(exps);for(var i=0;i<arr.length;i++){var e=arr[i];if(!e||!e.splitBetween)continue;var sb=Object.values(e.splitBetween);if(e.scope==="personal"&&e.paidBy===uid2)t+=toI(e.amount,e.currency);else if(e.scope==="shared"&&sb.indexOf(uid2)>=0)t+=toI(e.amount/sb.length,e.currency);}return t;}
function settle(exps,mems){if(!exps||!mems)return[];var arr=Object.values(exps);var marr=Object.values(mems);var b={};marr.forEach(function(m){b[m.id]=0;});arr.filter(function(e){return e&&e.scope==="shared"&&e.splitBetween;}).forEach(function(e){var sb=Object.values(e.splitBetween);var s=e.amount/sb.length;if(b[e.paidBy]!==undefined)b[e.paidBy]+=e.amount;sb.forEach(function(u){if(b[u]!==undefined)b[u]-=s;});});var d=[],c=[];marr.forEach(function(m){var v=Math.round(b[m.id]*100)/100;if(v<-0.01)d.push({id:m.id,a:-v});if(v>0.01)c.push({id:m.id,a:v});});d.sort(function(a,b2){return b2.a-a.a;});c.sort(function(a,b2){return b2.a-a.a;});var r=[],di=0,ci=0;while(di<d.length&&ci<c.length){var t2=Math.min(d[di].a,c[ci].a);if(t2>0.01)r.push({from:d[di].id,to:c[ci].id,a:Math.round(t2*100)/100});d[di].a-=t2;c[ci].a-=t2;if(d[di].a<0.01)di++;if(c[ci].a<0.01)ci++;}return r;}
function daysFromRange(sd,ed){var days=[];var s=new Date(sd);var e=new Date(ed);if(isNaN(s.getTime())||isNaN(e.getTime()))return[{dn:1,dt:sd||"2026-01-01",items:{}}];var n=1;while(s<=e){days.push({dn:n,dt:s.toISOString().split("T")[0],items:{}});s.setDate(s.getDate()+1);n++;if(n>30)break;}if(days.length===0)days.push({dn:1,dt:sd,items:{}});return days;}

  return <div style={{position:"relative"}}><input ref={ref} defaultValue={props.val||""} placeholder={props.ph||""} style={{width:"100%",padding:"10px 12px 10px 34px",borderRadius:10,border:"1px solid var(--bd)",background:"var(--sf)",color:"var(--txt)",fontSize:13,boxSizing:"border-box"}} /><span style={{position:"absolute",top:10,left:10,fontSize:14,pointerEvents:"none"}}>🔍</span></div>;
}

function GMap(props){
  var ref=useRef(null);var mi=useRef(null);var mk=useRef([]);var pl=useRef(null);var _r=useState(false),rdy=_r[0],setRdy=_r[1];
  useEffect(function(){gLoad(function(){setRdy(true);});},[]);
  useEffect(function(){
    if(!rdy||!ref.current)return;
    if(!mi.current){mi.current=new google.maps.Map(ref.current,{center:{lat:37.5,lng:24},zoom:6,mapTypeControl:true,streetViewControl:false,fullscreenControl:true});}

    var map=mi.current;var bounds=new google.maps.LatLngBounds();var path=[];var pts=props.pts||[];
    pts.forEach(function(p,i){
      if(!p||!p.lat||!p.lng)return;var pos={lat:p.lat,lng:p.lng};bounds.extend(pos);
      var isW=p.isW;var c=isW?"#E84393":(CLR[p.type]||"#888");

      m.addListener("click",function(){iw.open(map,m);});mk.current.push(m);

    if(path.length>1){pl.current=new google.maps.Polyline({path:path,geodesic:true,strokeColor:"#1B3A6B",strokeOpacity:0,strokeWeight:3,icons:[{icon:{path:"M 0,-1 0,1",strokeOpacity:1,strokeColor:"#1B3A6B",scale:3},offset:"0",repeat:"15px"}]});pl.current.setMap(map);}
    if(pts.length>0){map.fitBounds(bounds,50);if(pts.length===1)setTimeout(function(){map.setZoom(13);},300);}
  },[rdy,props.pts,props.ln]);
  return <div ref={ref} style={{width:"100%",height:380,borderRadius:14,overflow:"hidden",border:"1px solid var(--bd)"}} />;
}

// ── Trip View (main screen) ──
function TripView(props){
  var trip=props.trip;var aId=props.aId;var ln=props.ln;var t=L[ln];var isR=ln==="he";
  var _tab=useState("home"),tab=_tab[0],setTab=_tab[1];
  var _mod=useState(null),mod=_mod[0],setMod=_mod[1];
  var _eIt=useState(null),eIt=_eIt[0],setEIt=_eIt[1];
  var _sD=useState(0),sD=_sD[0],setSd=_sD[1];
  var _vA=useState(""),vA=_vA[0],setVA=_vA[1];
  var _eS=useState("list"),eS=_eS[0],setES=_eS[1];
  var _mD=useState(-1),mD=_mD[0],setMD=_mD[1];
  var _mvW=useState(null),mvW=_mvW[0],setMvW=_mvW[1];
  var _ne=useState({desc:"",amount:"",currency:"EUR",paidBy:"",splitBetween:[],scope:"shared"}),ne=_ne[0],setNe=_ne[1];
  var _nw=useState({title:"",titleEn:"",location:"",lat:0,lng:0,notes:""}),nw=_nw[0],setNw=_nw[1];
  var _nm=useState(""),nm=_nm[0],setNm=_nm[1];
  var _tf=useState({}),tf=_tf[0],setTf=_tf[1];
  var _cp=useState(false),cp=_cp[0],setCp=_cp[1];
  var _nci=useState({text:"",textEn:"",cat:"misc",qty:1}),nci=_nci[0],setNci=_nci[1];
  var _clCat=useState("all"),clCat=_clCat[0],setClCat=_clCat[1];
  var _cvAmt=useState(""),cvAmt=_cvAmt[0],setCvAmt=_cvAmt[1];
  var _cvFrom=useState("EUR"),cvFrom=_cvFrom[0],setCvFrom=_cvFrom[1];
  var _cvTo=useState("ILS"),cvTo=_cvTo[0],setCvTo=_cvTo[1];
  var _cvRates=useState({ILS:1,EUR:4.05,USD:3.65,GBP:4.68,THB:0.1,JPY:0.024,TRY:0.11}),cvRates=_cvRates[0],setCvRates=_cvRates[1];

  function updF(path,val){fbDB.ref("trips/"+aId+"/"+path).set(val);}

  var mems=objArr(trip.mems||{});
  var exps=objArr(trip.exps||{});
  var wl=objArr(trip.wl||{});
  var itin=objArr(trip.itin||{}).sort(function(a,b){return a.dn-b.dn;});
  var cl=objArr(trip.cl||{});
  if(!vA&&mems.length>0&&!mems.find(function(m){return m.id===vA;}))setVA(mems[0].id);
  var me=mems.find(function(m){return m.id===vA;})||mems[0]||{id:"",name:"?",nameEn:"?",av:"?",c:"#888"};
  var myS=pSpent(trip.exps,vA);
  var totS=exps.reduce(function(s,e){return e?s+toI(e.amount||0,e.currency||"ILS"):s;},0);
  var setts=settle(trip.exps,trip.mems);
  var day=itin[sD]||itin[0]||{dn:1,dt:"",items:{}};
  var dayItems=objArr(day.items||{});

  // Item costs total for current day
  var dayCost=dayItems.reduce(function(s,it){return s+toI(it.price||0,it.priceCur||"ILS");},0);

  // Map points
  var mPts=[];
  if(mD===-1){itin.forEach(function(d){objArr(d.items||{}).forEach(function(i){if(i&&i.lat&&i.lng)mPts.push(Object.assign({},i));});});}
  else if(itin[mD]){objArr(itin[mD].items||{}).forEach(function(i){if(i&&i.lat&&i.lng)mPts.push(Object.assign({},i));});}
  wl.forEach(function(w){if(w&&w.lat&&w.lng)mPts.push(Object.assign({},w,{isW:true}));});

  var nav=[{k:"home",e:"🏠",l:t.home},{k:"itinerary",e:"📅",l:t.itin},{k:"map",e:"🗺️",l:t.map},{k:"expenses",e:"💰",l:t.exp},{k:"more",e:"⚙️",l:t.more}];

  var fab=function(fn){return <button onClick={fn} style={{position:"fixed",bottom:70,left:isR?16:"auto",right:isR?"auto":16,width:50,height:50,borderRadius:14,background:"var(--cta)",color:"#fff",border:"none",boxShadow:"0 4px 16px rgba(255,107,52,.35)",cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}}>+</button>;};

  function shareLink(){var url=window.location.origin+window.location.pathname+"?join="+trip.inv;if(navigator.clipboard){navigator.clipboard.writeText(url);setCp(true);setTimeout(function(){setCp(false);},2000);}if(navigator.share){navigator.share({title:"TripMate",text:t.joinCode+": "+trip.inv,url:url}).catch(function(){});}}

  return <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh"}}>
    {/* Header */}
    <header style={{position:"sticky",top:0,zIndex:90,background:"var(--nav)",backdropFilter:"blur(16px)",borderBottom:"1px solid var(--bd)",padding:"9px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button onClick={props.onBack} style={{background:"var(--sf)",border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,color:"var(--txt)",display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div><h1 style={{fontSize:15,fontWeight:800,color:"var(--txt)",margin:0}}>{ln==="he"?trip.name:trip.nameEn}</h1><p style={{fontSize:9,color:"var(--mt)",margin:0}}>{trip.sd} — {trip.ed}</p></div>
      </div>
      <div style={{display:"flex",gap:4}}>
        <button onClick={function(){setTf({name:trip.name,nameEn:trip.nameEn,sd:trip.sd,ed:trip.ed,budget:trip.budget||0});setMod("editT");}} style={{background:"var(--sf)",border:"1px solid var(--bd)",borderRadius:8,padding:"4px 7px",cursor:"pointer",fontSize:12,color:"var(--txt)"}}>✏️</button>
        <button onClick={function(){props.setLn(ln==="he"?"en":"he");}} style={{background:"var(--sf)",border:"1px solid var(--bd)",borderRadius:8,padding:"4px 8px",cursor:"pointer",fontSize:10,fontWeight:600,color:"var(--txt)"}}>{ln==="he"?"EN":"עב"}</button>
      </div>
    </header>

    <main style={{padding:14,paddingBottom:78}}>

      {/* ═══ HOME ═══ */}
      {tab==="home" && <div>
        <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:10}}>
          <span style={{fontSize:10,color:"var(--mt)",fontWeight:600}}>{t.view}</span>
          {mems.map(function(m){return <button key={m.id} onClick={function(){setVA(m.id);}} style={{width:24,height:24,borderRadius:"50%",border:vA===m.id?"2.5px solid "+m.c:"2.5px solid transparent",background:m.c,color:"#fff",fontSize:9,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{m.av}</button>;})}
        </div>
        <div style={{background:"linear-gradient(135deg,var(--gA),var(--gB))",borderRadius:16,padding:18,color:"#fff",marginBottom:14}}>
          <p style={{fontSize:11,opacity:.8,margin:0,color:"#fff"}}>{t.myB} — {ln==="he"?me.name:me.nameEn}</p>
          <p style={{fontSize:28,fontWeight:800,margin:"4px 0",color:"#fff"}}>{money(Math.round(myS),"ILS")}</p>
          <p style={{fontSize:11,opacity:.6,margin:0,color:"#fff"}}>{t.grpB}: {money(Math.round(totS),"ILS")}</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:16}}>
          {[{k:"itinerary",e:"📅",l:t.itin},{k:"map",e:"🗺️",l:t.map},{k:"expenses",e:"💰",l:t.exp},{k:"more",e:"👥",l:t.grp},{k:"wishlist",e:"❤️",l:t.wish},{k:"checklist",e:"✅",l:t.chk}].map(function(a){return <button key={a.k} onClick={function(){setTab(a.k);}} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:12,padding:"10px 4px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><span style={{fontSize:20}}>{a.e}</span><span style={{fontSize:10,fontWeight:600,color:"var(--txt)"}}>{a.l}</span></button>;})}
        </div>
        {itin.length>0 && <div>
          <h3 style={{fontSize:14,fontWeight:700,color:"var(--txt)",margin:"0 0 8px"}}>{t.day} 1 — {(itin[0]||{}).dt||""}</h3>
          {objArr((itin[0]||{}).items||{}).slice(0,4).map(function(it){if(!it)return null;return <div key={it.id||Math.random()} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:10,padding:10,marginBottom:6,display:"flex",alignItems:"center",gap:8,borderRight:"3px solid "+(CLR[it.type]||"#888")}}>
            <span style={{fontSize:18}}>{it.transportSub?EMJ[it.transportSub]:(EMJ[it.type]||"📌")}</span>
            <div style={{flex:1}}><p style={{fontSize:12,fontWeight:600,color:"var(--txt)",margin:0}}>{ln==="he"?it.title:it.titleEn||it.title}</p><p style={{fontSize:10,color:"var(--mt)",margin:0}}>{it.time||""} · {it.location||""}</p></div>
            {it.price>0 && <span style={{fontSize:10,fontWeight:700,color:"var(--ok)"}}>{money(it.price,it.priceCur||"ILS")}</span>}
          </div>;})}
        </div>}
      </div>}

      {/* ═══ ITINERARY ═══ */}
      {tab==="itinerary" && <div>
        <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:8}}>
          {itin.map(function(d,i){return <button key={i} onClick={function(){setSd(i);}} style={{flexShrink:0,padding:"7px 15px",borderRadius:10,border:sD===i?"2px solid var(--ac)":"1px solid var(--bd)",background:sD===i?"var(--ac)":"var(--card)",color:sD===i?"#fff":"var(--txt)",cursor:"pointer"}}><div style={{fontSize:10,fontWeight:sD===i?700:500}}>{t.day} {d.dn}</div><div style={{fontSize:9,opacity:.6}}>{(d.dt||"").slice(5)}</div></button>;})}
          <button onClick={function(){var dn=itin.length+1;var last=itin[itin.length-1];var nd="";if(last&&last.dt){var dd=new Date(last.dt);dd.setDate(dd.getDate()+1);nd=dd.toISOString().split("T")[0];}updF("itin/d"+(itin.length),{dn:dn,dt:nd,items:{}});}} style={{flexShrink:0,padding:"7px 15px",borderRadius:10,border:"2px dashed var(--bd)",background:"transparent",color:"var(--mt)",cursor:"pointer",fontSize:14}}>+</button>
        </div>

        {/* Day cost summary */}
        {dayCost>0 && <div style={{background:"var(--acS)",borderRadius:8,padding:"6px 10px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:10,color:"var(--mt)"}}>{t.day} {day.dn} {t.total}:</span>
          <span style={{fontSize:12,fontWeight:700,color:"var(--ac)"}}>{money(Math.round(dayCost),"ILS")}</span>
        </div>}

        {dayItems.length===0 && <p style={{textAlign:"center",padding:30,color:"var(--mt)"}}>{t.noI}</p>}
        {dayItems.map(function(it,idx){if(!it)return null;
          var emoji=it.transportSub?EMJ[it.transportSub]:(EMJ[it.type]||"📌");
          var typeName=it.type==="transport"&&it.transportSub?(t.trSub[it.transportSub]||it.transportSub):(t.ty[it.type]||"");
          return <div key={it.id||idx} onClick={function(){setEIt(it);setMod("editI");}} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:11,padding:11,marginBottom:8,borderTop:"3px solid "+(CLR[it.type]||"#888"),cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:10,fontWeight:600,color:CLR[it.type]||"#888"}}>{emoji} {typeName} · {it.time||""}{it.endTime?" — "+it.endTime:""}</span>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                {it.price>0 && <span style={{fontSize:10,fontWeight:700,color:"var(--ok)",background:"var(--ok)"+"15",padding:"1px 6px",borderRadius:5}}>{money(it.price,it.priceCur||"ILS")}</span>}
                <span style={{color:"var(--mt)",fontSize:11}}>✏️</span>
              </div>
            </div>
            <p style={{fontSize:13,fontWeight:700,color:"var(--txt)",margin:"0 0 2px"}}>{ln==="he"?it.title:it.titleEn||it.title}</p>
            <p style={{fontSize:10,color:"var(--mt)",margin:0}}>📍 {it.location||""}</p>
            {it.flightNum && <span style={{fontSize:9,fontWeight:700,color:CLR.flight,background:CLR.flight+"15",padding:"1px 6px",borderRadius:4,display:"inline-block",marginTop:3}}>{it.flightNum}{it.terminal?" · T"+it.terminal:""}{it.gate?" · Gate "+it.gate:""}</span>}
            {it.checkInDate && <span style={{fontSize:9,color:"#A855F7",display:"inline-block",marginTop:3,marginRight:6}}>🔑 {t.checkIn}: {it.checkInDate}</span>}
            {it.checkOutDate && <span style={{fontSize:9,color:"#A855F7",display:"inline-block",marginTop:3}}>🚪 {t.checkOut}: {it.checkOutDate}</span>}
            {it.transportSub && it.fromLocation && <p style={{fontSize:9,color:"var(--warn)",marginTop:3}}>{it.fromLocation} → {it.toLocation||""}</p>}
          </div>;
        })}
        {fab(function(){setEIt(null);setMod("addI");})}
        <Mod open={mod==="addI"||mod==="editI"} onClose={function(){setMod(null);}} title={mod==="addI"?t.add+" "+t.itin:t.edit} ch={
          <IForm item={mod==="editI"?eIt:null} isEd={mod==="editI"} ln={ln}
            onSave={function(d){var itemId=mod==="editI"&&eIt?eIt.id:xid();var item=Object.assign({},d,{id:itemId});updF("itin/d"+sD+"/items/"+itemId,item);setMod(null);}}
            onDel={eIt?function(){updF("itin/d"+sD+"/items/"+eIt.id,null);setMod(null);}:null}
            onCancel={function(){setMod(null);}}
          />
        } />
      </div>}

      {/* ═══ MAP ═══ */}
      {tab==="map" && <div>
        <div style={{display:"flex",gap:4,overflowX:"auto",marginBottom:10}}>
          <button onClick={function(){setMD(-1);}} style={{flexShrink:0,padding:"6px 11px",borderRadius:8,border:mD===-1?"2px solid var(--ac)":"1px solid var(--bd)",background:mD===-1?"var(--ac)":"var(--card)",color:mD===-1?"#fff":"var(--txt)",cursor:"pointer",fontSize:11,fontWeight:600}}>{t.all}</button>
          {itin.map(function(_,i){return <button key={i} onClick={function(){setMD(i);}} style={{flexShrink:0,padding:"6px 11px",borderRadius:8,border:mD===i?"2px solid var(--ac)":"1px solid var(--bd)",background:mD===i?"var(--ac)":"var(--card)",color:mD===i?"#fff":"var(--txt)",cursor:"pointer",fontSize:11,fontWeight:600}}>{t.day} {i+1}</button>;})}
        </div>
        <GMap pts={mPts} ln={ln} />
        <div style={{marginTop:10}}>{mPts.map(function(p,i){if(!p)return null;return <div key={(p.id||"")+i} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 0",borderBottom:"1px solid var(--bd)"}}><span style={{width:22,height:22,borderRadius:"50%",background:p.isW?"#E84393":(CLR[p.type]||"#888"),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,flexShrink:0}}>{p.isW?"♥":i+1}</span><div style={{flex:1}}><p style={{fontSize:12,fontWeight:600,color:"var(--txt)",margin:0}}>{ln==="he"?p.title:p.titleEn||p.title}</p><p style={{fontSize:9,color:"var(--mt)",margin:0}}>{p.location||""}</p></div>{p.price>0 && <span style={{fontSize:9,fontWeight:700,color:"var(--ok)"}}>{money(p.price,p.priceCur||"ILS")}</span>}</div>;})}</div>
      </div>}

      {/* ═══ EXPENSES ═══ */}
      {tab==="expenses" && <div>
        <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:8}}>
          <span style={{fontSize:10,color:"var(--mt)",fontWeight:600}}>{t.view}</span>
          {mems.map(function(m){return <button key={m.id} onClick={function(){setVA(m.id);}} style={{width:22,height:22,borderRadius:"50%",border:vA===m.id?"2px solid "+m.c:"2px solid transparent",background:m.c,color:"#fff",fontSize:8,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{m.av}</button>;})}
        </div>
        <div style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:11,padding:12,marginBottom:10,display:"flex",justifyContent:"space-between"}}>
          <div><p style={{fontSize:10,color:"var(--mt)",margin:0}}>{t.spent}</p><p style={{fontSize:20,fontWeight:800,color:"var(--txt)",margin:0}}>{money(Math.round(myS),"ILS")}</p></div>
          <div style={{textAlign:"end"}}><p style={{fontSize:10,color:"var(--mt)",margin:0}}>{t.total}</p><p style={{fontSize:14,fontWeight:700,color:"var(--ac)",margin:0}}>{money(Math.round(totS),"ILS")}</p></div>
        </div>
        <div style={{display:"flex",gap:2,background:"var(--sf)",borderRadius:8,padding:2,marginBottom:10}}>
          <button onClick={function(){setES("list");}} style={{flex:1,padding:7,borderRadius:6,border:"none",background:eS==="list"?"var(--card)":"transparent",color:eS==="list"?"var(--txt)":"var(--mt)",fontWeight:eS==="list"?700:500,fontSize:11,cursor:"pointer"}}>{t.hist}</button>
          <button onClick={function(){setES("bal");}} style={{flex:1,padding:7,borderRadius:6,border:"none",background:eS==="bal"?"var(--card)":"transparent",color:eS==="bal"?"var(--txt)":"var(--mt)",fontWeight:eS==="bal"?700:500,fontSize:11,cursor:"pointer"}}>{t.bal}</button>
        </div>
        {eS==="list" && exps.map(function(ex){if(!ex)return null;var py=mems.find(function(m){return m.id===ex.paidBy;});return <div key={ex.id} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:10,padding:10,marginBottom:6}}><div style={{display:"flex",justifyContent:"space-between"}}><div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{width:26,height:26,borderRadius:"50%",background:(py&&py.c)||"#888",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{(py&&py.av)||"?"}</span><div><p style={{fontSize:12,fontWeight:600,color:"var(--txt)",margin:0}}>{ln==="he"?ex.desc:ex.descEn||ex.desc}</p><p style={{fontSize:9,color:"var(--mt)",margin:0}}>{ex.scope==="personal"?"🔒 "+t.pers:"👥 "+t.share}</p></div></div><div style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:13,fontWeight:700,color:"var(--txt)"}}>{money(ex.amount||0,ex.currency||"ILS")}</span><button onClick={function(){updF("exps/"+ex.id,null);}} style={{background:"none",border:"none",color:"var(--mt)",cursor:"pointer",opacity:.3,fontSize:12}}>🗑</button></div></div></div>;})}
        {eS==="bal" && <div>
          {setts.length===0 && <p style={{textAlign:"center",padding:20,color:"var(--mt)"}}>✓ {t.ok}</p>}
          {setts.map(function(s,i){var fr=mems.find(function(m){return m.id===s.from;});var to2=mems.find(function(m){return m.id===s.to;});return <div key={i} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:10,padding:11,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,fontWeight:600,color:"var(--txt)"}}>{fr?(ln==="he"?fr.name:fr.nameEn):"?"} {t.owes} {to2?(ln==="he"?to2.name:to2.nameEn):"?"}</span><span style={{fontSize:14,fontWeight:800,color:"var(--err)"}}>{money(s.a,(exps[0]&&exps[0].currency)||"EUR")}</span></div>;})}
        </div>}
        {fab(function(){setNe({desc:"",amount:"",currency:"EUR",paidBy:mems[0]?mems[0].id:"",splitBetween:mems.map(function(m){return m.id;}),scope:"shared"});setMod("addE");})}
        <Mod open={mod==="addE"} onClose={function(){setMod(null);}} title={t.add+" "+t.exp} ch={<div>
          <div style={{display:"flex",gap:2,background:"var(--sf)",borderRadius:6,padding:2,marginBottom:10}}>
            <button onClick={function(){setNe(Object.assign({},ne,{scope:"shared"}));}} style={{flex:1,padding:6,borderRadius:5,border:"none",background:ne.scope==="shared"?"var(--card)":"transparent",color:ne.scope==="shared"?"var(--txt)":"var(--mt)",fontWeight:ne.scope==="shared"?700:500,fontSize:11,cursor:"pointer"}}>{t.shE}</button>
            <button onClick={function(){setNe(Object.assign({},ne,{scope:"personal"}));}} style={{flex:1,padding:6,borderRadius:5,border:"none",background:ne.scope==="personal"?"var(--card)":"transparent",color:ne.scope==="personal"?"var(--txt)":"var(--mt)",fontWeight:ne.scope==="personal"?700:500,fontSize:11,cursor:"pointer"}}>{t.prE}</button>
          </div>
          <Fld l={t.desc} ch={<Inp value={ne.desc} onChange={function(e){setNe(Object.assign({},ne,{desc:e.target.value}));}} />} />
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8}}>
            <Fld l={t.amount} ch={<Inp type="number" value={ne.amount} onChange={function(e){setNe(Object.assign({},ne,{amount:e.target.value}));}} />} />
            <Fld l={t.cur} ch={<Sel v={ne.currency} fn={function(e){setNe(Object.assign({},ne,{currency:e.target.value}));}} ops={CURS.map(function(c){return{v:c,l:c};})} />} />
          </div>
          <Fld l={t.paid} ch={<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{mems.map(function(m){return <Chip key={m.id} on={ne.paidBy===m.id} c={m.c} fn={function(){setNe(Object.assign({},ne,{paidBy:m.id}));}} ch={<span>{ln==="he"?m.name:m.nameEn}</span>} />;})}</div>} />
          <Bt ch={t.save} fn={function(){if(!ne.amount||!ne.desc)return;var eid=xid();var ex=Object.assign({},ne,{id:eid,amount:parseFloat(ne.amount),descEn:ne.desc,date:new Date().toISOString().split("T")[0],category:"misc"});if(ex.scope==="personal")ex.splitBetween=[ex.paidBy];updF("exps/"+eid,ex);setMod(null);}} st={{width:"100%",justifyContent:"center",marginTop:8}} />
        </div>} />
      </div>}

      {/* ═══ MORE (Group + Wish + Check + Emergency + Converter) ═══ */}
      {tab==="more" && <div>
        {/* Sub-tabs */}
        <div style={{display:"flex",gap:4,overflowX:"auto",marginBottom:12}}>
          {[{k:"group",e:"👥",l:t.grp},{k:"wishlist",e:"❤️",l:t.wish},{k:"checklist",e:"✅",l:t.chk},{k:"emergency",e:"🆘",l:t.emergency},{k:"converter",e:"💱",l:t.converter}].map(function(st){return <button key={st.k} onClick={function(){setTab(st.k);}} style={{flexShrink:0,padding:"6px 12px",borderRadius:8,background:"var(--card)",border:"1px solid var(--bd)",cursor:"pointer",fontSize:11,fontWeight:600,color:"var(--txt)"}}>{st.e} {st.l}</button>;})}
        </div>

        {/* Group */}
        <div style={{background:"linear-gradient(135deg,var(--gA),var(--gB))",borderRadius:14,padding:18,color:"#fff",marginBottom:14}}>
          <h2 style={{fontSize:17,fontWeight:800,color:"#fff",margin:"0 0 10px"}}>{ln==="he"?trip.name:trip.nameEn}</h2>
          <div style={{background:"rgba(255,255,255,.14)",borderRadius:8,padding:"7px 10px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div><p style={{fontSize:8,color:"rgba(255,255,255,.5)",margin:0}}>{t.invite}</p><p style={{fontSize:15,fontWeight:800,letterSpacing:3,color:"#fff",margin:0}}>{trip.inv}</p></div>
            <button onClick={function(){if(navigator.clipboard){navigator.clipboard.writeText(trip.inv);setCp(true);setTimeout(function(){setCp(false);},2000);}}} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:6,padding:"4px 8px",color:"#fff",cursor:"pointer",fontSize:10,fontWeight:600}}>{cp?"✓":t.copy}</button>
          </div>
          <button onClick={shareLink} style={{width:"100%",padding:8,borderRadius:8,background:"rgba(255,255,255,.12)",border:"none",color:"#fff",cursor:"pointer",fontSize:11,fontWeight:600}}>🔗 {t.shareLink}</button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <h3 style={{fontSize:14,fontWeight:700,color:"var(--txt)",margin:0}}>{t.mems} ({mems.length})</h3>
          <button onClick={function(){setNm("");setMod("addM");}} style={{background:"var(--acS)",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",color:"var(--ac)",fontSize:10,fontWeight:600}}>+ {t.addM}</button>
        </div>
        {mems.map(function(m){return <div key={m.id} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:10,padding:10,marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:34,height:34,borderRadius:"50%",background:m.c,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700}}>{m.av}</span>
          <div style={{flex:1}}><p style={{fontSize:13,fontWeight:700,color:"var(--txt)",margin:0}}>{ln==="he"?m.name:m.nameEn}</p><p style={{fontSize:9,color:"var(--mt)",margin:0}}>{money(Math.round(pSpent(trip.exps,m.id)),"ILS")} {t.spent}</p></div>
          {mems.length>1 && <button onClick={function(){updF("mems/"+m.id,null);}} style={{background:"none",border:"none",color:"var(--mt)",cursor:"pointer",opacity:.3,fontSize:12}}>🗑</button>}
        </div>;})}
        <Mod open={mod==="addM"} onClose={function(){setMod(null);}} title={t.addM} ch={<div>
          <Fld l={t.name} ch={<Inp value={nm} onChange={function(e){setNm(e.target.value);}} />} />
          <Bt ch={t.save} fn={function(){if(!nm)return;var mid=xid();updF("mems/"+mid,{id:mid,name:nm,nameEn:nm,av:nm.charAt(0).toUpperCase(),c:MCOL[mems.length%MCOL.length]});setMod(null);}} st={{width:"100%",justifyContent:"center"}} />
        </div>} />
      </div>}

      {/* ═══ WISHLIST ═══ */}
      {tab==="wishlist" && <div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"var(--txt)",margin:0}}>❤️ {t.wish}</h2>
          <Bt ch={"+ "+t.addW} fn={function(){setNw({title:"",titleEn:"",location:"",lat:0,lng:0,notes:""});setMod("addW");}} st={{padding:"5px 10px",fontSize:10}} />
        </div>
        {wl.length===0 && <p style={{textAlign:"center",padding:30,color:"var(--mt)"}}>{t.noW}</p>}
        {wl.map(function(w){if(!w)return null;return <div key={w.id} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:11,padding:11,marginBottom:7,borderRight:"3px solid #E84393"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><p style={{fontSize:13,fontWeight:600,color:"var(--txt)",margin:0}}>{ln==="he"?w.title:w.titleEn||w.title}</p><p style={{fontSize:10,color:"var(--mt)",margin:"2px 0 0"}}>📍 {w.location||""}</p></div>
            <div style={{display:"flex",gap:3}}>
              <button onClick={function(){setMvW(mvW===w.id?null:w.id);}} style={{background:"var(--acS)",border:"none",borderRadius:5,padding:"3px 7px",cursor:"pointer",color:"var(--ac)",fontSize:9,fontWeight:600}}>{t.move}</button>
              <button onClick={function(){updF("wl/"+w.id,null);}} style={{background:"none",border:"none",color:"var(--mt)",cursor:"pointer",opacity:.3,fontSize:12}}>🗑</button>
            </div>
          </div>
          {mvW===w.id && <div style={{display:"flex",gap:4,marginTop:7,paddingTop:7,borderTop:"1px solid var(--bd)",flexWrap:"wrap"}}>
            {itin.map(function(d,i){return <button key={i} onClick={function(){var itemId=xid();updF("itin/d"+i+"/items/"+itemId,Object.assign({},w,{id:itemId,time:"",endTime:""}));updF("wl/"+w.id,null);setMvW(null);}} style={{padding:"5px 10px",borderRadius:6,border:"1px solid var(--bd)",background:"var(--sf)",cursor:"pointer",fontSize:10,fontWeight:600,color:"var(--txt)"}}>{t.day} {d.dn}</button>;})}
          </div>}
        </div>;})}
        <Mod open={mod==="addW"} onClose={function(){setMod(null);}} title={t.addW} ch={<div>
          <Fld l={t.title} ch={<Inp value={ln==="he"?nw.title:nw.titleEn} onChange={function(e){var v=e.target.value;if(ln==="he")setNw(Object.assign({},nw,{title:v,titleEn:v}));else setNw(Object.assign({},nw,{titleEn:v,title:v}));}} />} />
          <Fld l={"📍 "+t.loc} ch={<PlIn val={nw.location} ph={t.search} onPick={function(loc){setNw(Object.assign({},nw,loc));}} />} />
          <Bt ch={t.save} fn={function(){if(!nw.title&&!nw.titleEn)return;var wid=xid();updF("wl/"+wid,Object.assign({},nw,{id:wid,type:"attraction"}));setMod(null);}} st={{width:"100%",justifyContent:"center",marginTop:6}} />
        </div>} />
      </div>}

      {/* ═══ CHECKLIST (enhanced) ═══ */}
      {tab==="checklist" && <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"var(--txt)",margin:0}}>✅ {t.chk}</h2>
          <Bt ch={"+ "+t.addItem} fn={function(){setNci({text:"",textEn:"",cat:"misc",qty:1});setMod("addCl");}} st={{padding:"5px 10px",fontSize:10}} />
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:8}}>
          <span style={{fontSize:10,color:"var(--mt)",fontWeight:600}}>{t.view}</span>
          {mems.map(function(m){return <button key={m.id} onClick={function(){setVA(m.id);}} style={{width:22,height:22,borderRadius:"50%",border:vA===m.id?"2px solid "+m.c:"2px solid transparent",background:m.c,color:"#fff",fontSize:8,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{m.av}</button>;})}
        </div>
        {/* Category filter */}
        <div style={{display:"flex",gap:4,overflowX:"auto",marginBottom:10}}>
          <Chip on={clCat==="all"} c="var(--ac)" fn={function(){setClCat("all");}} ch={<span>{t.all}</span>} />
          {CL_CATS.map(function(cat){return <Chip key={cat} on={clCat===cat} c="var(--ac)" fn={function(){setClCat(cat);}} ch={<span>{CL_CAT_E[cat]} {ln==="he"?CL_CAT_HE[cat]:CL_CAT_EN[cat]}</span>} />;})}
        </div>
        {cl.filter(function(c){return c&&(clCat==="all"||c.cat===clCat);}).map(function(c){if(!c)return null;var ck=c.ck&&c.ck[vA];
          return <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",background:"var(--card)",border:"1px solid var(--bd)",borderRadius:8,marginBottom:5}}>
            <button onClick={function(){updF("cl/"+c.id+"/ck/"+vA,!ck);}} style={{width:22,height:22,borderRadius:6,border:"2px solid "+(ck?"var(--ok)":"var(--bd)"),background:ck?"var(--ok)":"transparent",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0,cursor:"pointer"}}>{ck?"✓":""}</button>
            <div style={{flex:1}}>
              <span style={{fontSize:13,color:ck?"var(--mt)":"var(--txt)",textDecoration:ck?"line-through":"none"}}>{ln==="he"?c.text:c.textEn||c.text}</span>
              {c.qty>1 && <span style={{fontSize:10,color:"var(--warn)",marginRight:6,marginLeft:6}}>×{c.qty}</span>}
              <span style={{fontSize:9,color:"var(--mt)"}}>{CL_CAT_E[c.cat]||"📦"}</span>
            </div>
            <button onClick={function(){updF("cl/"+c.id,null);}} style={{background:"none",border:"none",color:"var(--mt)",cursor:"pointer",opacity:.3,fontSize:11}}>🗑</button>
          </div>;
        })}
        <Mod open={mod==="addCl"} onClose={function(){setMod(null);}} title={t.addItem} ch={<div>
          <Fld l={ln==="he"?"פריט":"Item"} ch={<Inp value={ln==="he"?nci.text:nci.textEn} onChange={function(e){var v=e.target.value;if(ln==="he")setNci(Object.assign({},nci,{text:v,textEn:v}));else setNci(Object.assign({},nci,{textEn:v,text:v}));}} />} />
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Fld l={t.qty} ch={<Inp type="number" value={nci.qty} onChange={function(e){setNci(Object.assign({},nci,{qty:parseInt(e.target.value)||1}));}} />} />
            <Fld l={t.cat} ch={<Sel v={nci.cat} fn={function(e){setNci(Object.assign({},nci,{cat:e.target.value}));}} ops={CL_CATS.map(function(c){return{v:c,l:(ln==="he"?CL_CAT_HE[c]:CL_CAT_EN[c])+" "+CL_CAT_E[c]};})} />} />
          </div>
          <Bt ch={t.save} fn={function(){if(!nci.text&&!nci.textEn)return;var cid=xid();updF("cl/"+cid,{id:cid,text:nci.text,textEn:nci.textEn,cat:nci.cat,qty:nci.qty,ck:{}});setMod(null);}} st={{width:"100%",justifyContent:"center",marginTop:6}} />
        </div>} />
      </div>}

      {/* ═══ EMERGENCY ═══ */}
      {tab==="emergency" && <div>
        <h2 style={{fontSize:16,fontWeight:700,color:"var(--txt)",margin:"0 0 6px"}}>🆘 {t.emergency}</h2>
        <p style={{fontSize:11,color:"var(--mt)",marginBottom:12}}>{t.emDesc}</p>
        {["police","ambulance","embassy","insurance"].map(function(k){
          var val=(trip.emergency&&trip.emergency[k])||"";
          return <div key={k} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:10,padding:10,marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:16}}>{k==="police"?"🚔":k==="ambulance"?"🚑":k==="embassy"?"🏛️":"🛡️"}</span>
                <div><p style={{fontSize:12,fontWeight:600,color:"var(--txt)",margin:0}}>{t[k]}</p>{val && <a href={"tel:"+val} style={{fontSize:13,fontWeight:700,color:"var(--ac)",textDecoration:"none"}}>{val}</a>}</div>
              </div>
              <button onClick={function(){var num=prompt(t[k]+":",val);if(num!==null)updF("emergency/"+k,num);}} style={{background:"var(--sf)",border:"none",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:10,color:"var(--ac)"}}>✏️</button>
            </div>
          </div>;
        })}
      </div>}

      {/* ═══ CONVERTER ═══ */}
      {tab==="converter" && <div>
        <h2 style={{fontSize:16,fontWeight:700,color:"var(--txt)",margin:"0 0 12px"}}>💱 {t.converter}</h2>
        <Fld l={t.amount} ch={<Inp type="number" value={cvAmt} onChange={function(e){setCvAmt(e.target.value);}} style={{fontSize:18,fontWeight:700,textAlign:"center"}} />} />
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          <Fld l={ln==="he"?"מ-":"From"} ch={<Sel v={cvFrom} fn={function(e){setCvFrom(e.target.value);}} ops={CURS.map(function(c){return{v:c,l:c};})} />} />
          <Fld l={ln==="he"?"ל-":"To"} ch={<Sel v={cvTo} fn={function(e){setCvTo(e.target.value);}} ops={CURS.map(function(c){return{v:c,l:c};})} />} />
        </div>
        {cvAmt && <div style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:12,padding:16,textAlign:"center",marginBottom:12}}>
          <p style={{fontSize:12,color:"var(--mt)",margin:"0 0 4px"}}>{t.result}</p>
          <p style={{fontSize:28,fontWeight:800,color:"var(--ac)",margin:0}}>{money(Math.round(parseFloat(cvAmt)*(cvRates[cvFrom]||1)/(cvRates[cvTo]||1)*100)/100,cvTo)}</p>
          <p style={{fontSize:10,color:"var(--mt)",marginTop:4}}>{t.rate}: 1 {cvFrom} = {((cvRates[cvFrom]||1)/(cvRates[cvTo]||1)).toFixed(4)} {cvTo}</p>
        </div>}
        <div style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:12,padding:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <p style={{fontSize:12,fontWeight:700,color:"var(--txt)",margin:0}}>{ln==="he"?"שערי חליפין (ל-₪)":"Exchange Rates (to ₪)"}</p>
            <button onClick={function(){
              fetch("https://api.exchangerate-api.com/v4/latest/ILS").then(function(r){return r.json();}).then(function(data){
                if(data&&data.rates){var nr=Object.assign({},cvRates);CURS.forEach(function(c){if(data.rates[c])nr[c]=1/data.rates[c];});setCvRates(nr);}
              }).catch(function(){});
            }} style={{background:"var(--acS)",border:"none",borderRadius:6,padding:"3px 8px",cursor:"pointer",color:"var(--ac)",fontSize:9,fontWeight:600}}>🔄 {ln==="he"?"עדכן":"Update"}</button>
          </div>
          {CURS.map(function(c){return <div key={c} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            <span style={{fontSize:11,fontWeight:600,color:"var(--txt)",width:35}}>{c}</span>
            <span style={{fontSize:10,color:"var(--mt)"}}>=</span>
            <input type="number" step="0.01" value={cvRates[c]||""} onChange={function(e){var nr=Object.assign({},cvRates);nr[c]=parseFloat(e.target.value)||0;setCvRates(nr);}} style={{flex:1,padding:"4px 8px",borderRadius:6,border:"1px solid var(--bd)",background:"var(--sf)",color:"var(--txt)",fontSize:11,boxSizing:"border-box"}} />
            <span style={{fontSize:10,color:"var(--mt)"}}>₪</span>
          </div>;})}
        </div>
      </div>}

    </main>

    {/* Nav */}
    <nav style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"var(--nav)",backdropFilter:"blur(16px)",borderTop:"1px solid var(--bd)",display:"flex",justifyContent:"space-around",padding:"6px 0 env(safe-area-inset-bottom,6px)"}}>
      {nav.map(function(n){return <button key={n.k} onClick={function(){setTab(n.k);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,background:"none",border:"none",cursor:"pointer",padding:"5px 12px",color:tab===n.k?"var(--ac)":"var(--mt)"}}><span style={{fontSize:20}}>{n.e}</span><span style={{fontSize:9,fontWeight:tab===n.k?700:500}}>{n.l}</span>{tab===n.k && <span style={{width:4,height:4,borderRadius:"50%",background:"var(--ac)"}} />}</button>;})}
    </nav>

    {/* Edit Trip */}
    <Mod open={mod==="editT"} onClose={function(){setMod(null);}} title={t.editT} ch={<div>
      <Fld l={t.tName} ch={<Inp value={ln==="he"?tf.name:tf.nameEn} onChange={function(e){if(ln==="he")setTf(Object.assign({},tf,{name:e.target.value}));else setTf(Object.assign({},tf,{nameEn:e.target.value}));}} />} />
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Fld l={t.start} ch={<Inp type="date" value={tf.sd} onChange={function(e){setTf(Object.assign({},tf,{sd:e.target.value}));}} />} />
        <Fld l={t.stop} ch={<Inp type="date" value={tf.ed} onChange={function(e){setTf(Object.assign({},tf,{ed:e.target.value}));}} />} />
      </div>
      <Fld l={t.budget+" (₪)"} ch={<Inp type="number" value={tf.budget||0} onChange={function(e){setTf(Object.assign({},tf,{budget:parseFloat(e.target.value)||0}));}} />} />
      <Bt ch={t.save} fn={function(){fbDB.ref("trips/"+aId).update({name:tf.name||trip.name,nameEn:tf.nameEn||trip.nameEn,sd:tf.sd||trip.sd,ed:tf.ed||trip.ed,budget:tf.budget||0});fbDB.ref("userTrips/"+props.myUid+"/"+aId).update({name:tf.name||trip.name,nameEn:tf.nameEn||trip.nameEn});setMod(null);}} st={{width:"100%",justifyContent:"center",marginTop:6}} />
    </div>} />
  </div>;
}

// ── Check for join link in URL ──
var params=new URLSearchParams(window.location.search);
var joinParam=params.get("join");

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
