function pSpent(exps,uid2){var t=0;if(!exps)return 0;var arr=Object.values(exps);for(var i=0;i<arr.length;i++){var e=arr[i];if(!e||!e.splitBetween)continue;var sb=Object.values(e.splitBetween);if(e.scope==="personal"&&e.paidBy===uid2)t+=toI(e.amount,e.currency);else if(e.scope==="shared"&&sb.indexOf(uid2)>=0)t+=toI(e.amount/sb.length,e.currency);}return t;}
function settle(exps,mems){
  if(!exps||!mems)return[];
  var arr=Object.values(exps);var marr=Object.values(mems);
  var b={};marr.forEach(function(m){b[m.id]=0;});
  arr.filter(function(e){return e&&e.scope==="shared"&&e.splitBetween;}).forEach(function(e){
    var sb=Object.values(e.splitBetween);var s=e.amount/sb.length;
    if(b[e.paidBy]!==undefined)b[e.paidBy]+=e.amount;
    sb.forEach(function(u){if(b[u]!==undefined)b[u]-=s;});
  });
  var d=[],c=[];
  marr.forEach(function(m){var v=Math.round(b[m.id]*100)/100;if(v<-0.01)d.push({id:m.id,a:-v});if(v>0.01)c.push({id:m.id,a:v});});
  d.sort(function(a,b2){return b2.a-a.a;});c.sort(function(a,b2){return b2.a-a.a;});
  var r=[],di=0,ci=0;
  while(di<d.length&&ci<c.length){var t2=Math.min(d[di].a,c[ci].a);if(t2>0.01)r.push({from:d[di].id,to:c[ci].id,a:Math.round(t2*100)/100});d[di].a-=t2;c[ci].a-=t2;if(d[di].a<0.01)di++;if(c[ci].a<0.01)ci++;}
  return r;
}
function daysFromRange(sd,ed){
  var days=[];var s=new Date(sd);var e=new Date(ed);
  if(isNaN(s.getTime())||isNaN(e.getTime()))return[{dn:1,dt:sd||"2026-01-01",items:{}}];
  var n=1;while(s<=e){days.push({dn:n,dt:s.toISOString().split("T")[0],items:{}});s.setDate(s.getDate()+1);n++;if(n>30)break;}
  if(days.length===0)days.push({dn:1,dt:sd,items:{}});
  return days;
}

  }

  // ── Create trip ──
  function createTrip(f){
    var tripId=xid();
    var inv=Math.random().toString(36).substr(2,6).toUpperCase();
    var memId=xid();
    var days=daysFromRange(f.sd,f.ed);
    var itin={};
    days.forEach(function(d,i){itin["d"+i]=d;});
    var cl={};
    L.he.cl.forEach(function(c,i){cl["c"+i]={id:"c"+i,he:c,en:L.en.cl[i],ck:{}};});
    var tripData={
      id:tripId,name:f.name||"טיול",nameEn:f.nameEn||"Trip",sd:f.sd||"2026-01-01",ed:f.ed||"",
      inv:inv,budget:0,
      mems:{},itin:itin,exps:{},wl:{},cl:cl
    };
    tripData.mems[memId]={id:memId,uid:myUid,name:myName,nameEn:myName,av:myName.charAt(0).toUpperCase(),c:MCOL[0]};
    fbDB.ref("trips/"+tripId).set(tripData);
    fbDB.ref("userTrips/"+myUid+"/"+tripId).set({id:tripId,name:tripData.name,nameEn:tripData.nameEn,inv:inv});
    fbDB.ref("invites/"+inv).set(tripId);
    setAId(tripId);setTab("home");setSd(0);
  }

  // ── Join trip ──
  function joinTrip(code){
    if(!code)return;
    fbDB.ref("invites/"+code.toUpperCase()).once("value").then(function(snap){
      var tripId=snap.val();
      if(!tripId){alert(ln==="he"?"קוד לא נמצא":"Code not found");return;}
      fbDB.ref("trips/"+tripId).once("value").then(function(tSnap){
        var td=tSnap.val();
        if(!td){alert("Trip not found");return;}
        // Add member
        var memId=xid();
        fbDB.ref("trips/"+tripId+"/mems/"+memId).set({id:memId,uid:myUid,name:myName,nameEn:myName,av:myName.charAt(0).toUpperCase(),c:MCOL[Object.keys(td.mems||{}).length%MCOL.length]});
        fbDB.ref("userTrips/"+myUid+"/"+tripId).set({id:tripId,name:td.name,nameEn:td.nameEn,inv:td.inv});
        setAId(tripId);setTab("home");setMod(null);
      });
    });
  }

          {setts.map(function(s,i){var fr=mems.find(function(m){return m.id===s.from;});var to2=mems.find(function(m){return m.id===s.to;});return <div key={i} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:10,padding:11,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,fontWeight:600,color:"var(--txt)"}}>{fr?(ln==="he"?fr.name:fr.nameEn):"?"} {t.owes} {to2?(ln==="he"?to2.name:to2.nameEn):"?"}</span><span style={{fontSize:14,fontWeight:800,color:"#FF6B8A"}}>{money(s.a,(exps[0]&&exps[0].currency)||"EUR")}</span></div>;})}
        </div>}
        {fab(function(){setNe({desc:"",amount:"",currency:"EUR",paidBy:mems[0]?mems[0].id:"",splitBetween:mems.map(function(m){return m.id;}),scope:"shared"});setMod("addE");})}
        <Mod open={mod==="addE"} onClose={function(){setMod(null);}} title={t.add+" "+t.exp} ch={<div>
          <div style={{display:"flex",gap:2,background:"var(--sf)",borderRadius:6,padding:2,marginBottom:10}}>
            <button onClick={function(){setNe(Object.assign({},ne,{scope:"shared"}));}} style={{flex:1,padding:6,borderRadius:5,border:"none",background:ne.scope==="shared"?"var(--card)":"transparent",color:ne.scope==="shared"?"var(--txt)":"var(--mt)",fontWeight:ne.scope==="shared"?700:500,fontSize:11,cursor:"pointer"}}>{t.shE}</button>
            <button onClick={function(){setNe(Object.assign({},ne,{scope:"personal"}));}} style={{flex:1,padding:6,borderRadius:5,border:"none",background:ne.scope==="personal"?"var(--card)":"transparent",color:ne.scope==="personal"?"var(--txt)":"var(--mt)",fontWeight:ne.scope==="personal"?700:500,fontSize:11,cursor:"pointer"}}>{t.prE}</button>
          </div>
          <Fld l={t.desc} ch={<Inp value={ne.desc} onChange={function(e){setNe(Object.assign({},ne,{desc:e.target.value}));}} />} />
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8}}>
            <Fld l={t.amount} ch={<Inp type="number" value={ne.amount} onChange={function(e){setNe(Object.assign({},ne,{amount:e.target.value}));}} />} />
            <Fld l={t.cur} ch={<Sel v={ne.currency} fn={function(e){setNe(Object.assign({},ne,{currency:e.target.value}));}} ops={CURS.map(function(c){return{v:c,l:c};})} />} />
          </div>
          <Fld l={t.paid} ch={<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{mems.map(function(m){return <button key={m.id} onClick={function(){setNe(Object.assign({},ne,{paidBy:m.id}));}} style={{padding:"6px 10px",borderRadius:8,border:ne.paidBy===m.id?"2px solid "+m.c:"1px solid var(--bd)",background:ne.paidBy===m.id?m.c+"18":"var(--sf)",color:ne.paidBy===m.id?m.c:"var(--mt)",cursor:"pointer",fontWeight:600,fontSize:11}}>{ln==="he"?m.name:m.nameEn}</button>;})}</div>} />
          <Bt ch={t.save} fn={function(){if(!ne.amount||!ne.desc)return;var eid=xid();var ex=Object.assign({},ne,{id:eid,amount:parseFloat(ne.amount),descEn:ne.desc,date:new Date().toISOString().split("T")[0],category:"attraction"});if(ex.scope==="personal")ex.splitBetween=[ex.paidBy];updField("exps/"+eid,ex);setMod(null);}} st={{width:"100%",justifyContent:"center",marginTop:8}} />
        </div>} />
      </div>}

      {tab==="group" && <div>
        <div style={{background:"linear-gradient(135deg,var(--gA),var(--gB))",borderRadius:14,padding:18,color:"#fff",marginBottom:14}}>
          <h2 style={{fontSize:17,fontWeight:800,color:"#fff",margin:"0 0 10px"}}>{ln==="he"?trip.name:trip.nameEn}</h2>
          <div style={{background:"rgba(255,255,255,.14)",borderRadius:8,padding:"7px 10px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div><p style={{fontSize:8,color:"rgba(255,255,255,.5)",margin:0}}>{t.invite}</p><p style={{fontSize:15,fontWeight:800,letterSpacing:3,color:"#fff",margin:0}}>{trip.inv}</p></div>
            <button onClick={function(){if(navigator.clipboard){navigator.clipboard.writeText(trip.inv);setCp(true);setTimeout(function(){setCp(false);},2000);}}} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:6,padding:"4px 8px",color:"#fff",cursor:"pointer",fontSize:10,fontWeight:600}}>{cp?t.copied||"✓":t.copy}</button>
          </div>
          <button onClick={shareLink} style={{width:"100%",padding:8,borderRadius:8,background:"rgba(255,255,255,.12)",border:"none",color:"#fff",cursor:"pointer",fontSize:11,fontWeight:600}}>🔗 {t.shareLink} {cp?"✓":""}</button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <h3 style={{fontSize:14,fontWeight:700,color:"var(--txt)",margin:0}}>{t.mems} ({mems.length})</h3>
          <button onClick={function(){setNm("");setMod("addM");}} style={{background:"var(--acS)",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",color:"var(--ac)",fontSize:10,fontWeight:600}}>+ {t.addM}</button>
        </div>
        {mems.map(function(m){return <div key={m.id} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:10,padding:10,marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:34,height:34,borderRadius:"50%",background:m.c,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700}}>{m.av}</span>
          <div style={{flex:1}}><p style={{fontSize:13,fontWeight:700,color:"var(--txt)",margin:0}}>{ln==="he"?m.name:m.nameEn}</p><p style={{fontSize:9,color:"var(--mt)",margin:0}}>{money(Math.round(pSpent(trip.exps,m.id)),"ILS")} {t.spent}</p></div>
          {mems.length>1 && <button onClick={function(){updField("mems/"+m.id,null);}} style={{background:"none",border:"none",color:"var(--mt)",cursor:"pointer",opacity:.3,fontSize:12}}>🗑</button>}
        </div>;})}
        <Mod open={mod==="addM"} onClose={function(){setMod(null);}} title={t.addM} ch={<div>
          <Fld l={t.name} ch={<Inp value={nm} onChange={function(e){setNm(e.target.value);}} />} />
          <Bt ch={t.save} fn={function(){if(!nm)return;var mid=xid();updField("mems/"+mid,{id:mid,name:nm,nameEn:nm,av:nm.charAt(0).toUpperCase(),c:MCOL[mems.length%MCOL.length]});setMod(null);}} st={{width:"100%",justifyContent:"center"}} />
        </div>} />
      </div>}

      {tab==="wishlist" && <div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"var(--txt)",margin:0}}>❤️ {t.wish}</h2>
          <Bt ch={"+ "+t.addW} fn={function(){setNw({title:"",titleEn:"",location:"",lat:0,lng:0,notes:""});setMod("addW");}} st={{padding:"5px 10px",fontSize:10}} />
        </div>
        {wl.length===0 && <p style={{textAlign:"center",padding:30,color:"var(--mt)"}}>{t.noW}</p>}
        {wl.map(function(w){if(!w)return null;return <div key={w.id} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:11,padding:11,marginBottom:7,borderRight:"3px solid #E84393"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><p style={{fontSize:13,fontWeight:600,color:"var(--txt)",margin:0}}>{ln==="he"?w.title:w.titleEn||w.title}</p><p style={{fontSize:10,color:"var(--mt)",margin:"2px 0 0"}}>📍 {w.location||""}</p></div>
            <div style={{display:"flex",gap:3}}>
              <button onClick={function(){setMvW(mvW===w.id?null:w.id);}} style={{background:"var(--acS)",border:"none",borderRadius:5,padding:"3px 7px",cursor:"pointer",color:"var(--ac)",fontSize:9,fontWeight:600}}>{t.move}</button>
              <button onClick={function(){updField("wl/"+w.id,null);}} style={{background:"none",border:"none",color:"var(--mt)",cursor:"pointer",opacity:.3,fontSize:12}}>🗑</button>
            </div>
          </div>
          {mvW===w.id && <div style={{display:"flex",gap:4,marginTop:7,paddingTop:7,borderTop:"1px solid var(--bd)",flexWrap:"wrap"}}>
            {itin.map(function(d,i){return <button key={i} onClick={function(){var itemId=xid();var item=Object.assign({},w,{id:itemId,time:"",endTime:""});updField("itin/d"+i+"/items/"+itemId,item);updField("wl/"+w.id,null);setMvW(null);}} style={{padding:"5px 10px",borderRadius:6,border:"1px solid var(--bd)",background:"var(--sf)",cursor:"pointer",fontSize:10,fontWeight:600,color:"var(--txt)"}}>{t.day} {d.dn}</button>;})}
          </div>}
        </div>;})}
        <Mod open={mod==="addW"} onClose={function(){setMod(null);}} title={t.addW} ch={<div>
          <Fld l={t.title} ch={<Inp value={ln==="he"?nw.title:nw.titleEn} onChange={function(e){if(ln==="he")setNw(Object.assign({},nw,{title:e.target.value,titleEn:e.target.value}));else setNw(Object.assign({},nw,{titleEn:e.target.value,title:e.target.value}));}} />} />
          <Fld l={"📍 "+t.loc} ch={<div>
            <PlIn val={nw.location} ph={t.search} onPick={function(loc){setNw(Object.assign({},nw,loc));}} />
            {nw.lat!==0 && <p style={{fontSize:9,color:"var(--ac)",marginTop:3}}>✓ {nw.location}</p>}
          </div>} />
          <Bt ch={t.save} fn={function(){if(!nw.title&&!nw.titleEn)return;var wid=xid();updField("wl/"+wid,Object.assign({},nw,{id:wid,type:"attraction"}));setMod(null);}} st={{width:"100%",justifyContent:"center",marginTop:6}} />
        </div>} />
      </div>}

      {tab==="checklist" && <div>
        <h2 style={{fontSize:16,fontWeight:700,color:"var(--txt)",margin:"0 0 10px"}}>✅ {t.chk}</h2>
        <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:10}}>
          <span style={{fontSize:10,color:"var(--mt)",fontWeight:600}}>{t.view}</span>
          {mems.map(function(m){return <button key={m.id} onClick={function(){setVA(m.id);}} style={{width:22,height:22,borderRadius:"50%",border:vA===m.id?"2px solid "+m.c:"2px solid transparent",background:m.c,color:"#fff",fontSize:8,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{m.av}</button>;})}
        </div>
        {cl.map(function(c){if(!c)return null;var ck=c.ck&&c.ck[vA];return <button key={c.id} onClick={function(){var path="cl/"+c.id+"/ck/"+vA;updField(path,!ck);}} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"var(--card)",border:"1px solid var(--bd)",borderRadius:8,marginBottom:5,cursor:"pointer",textAlign:"inherit"}}>
          <span style={{width:22,height:22,borderRadius:6,border:"2px solid "+(ck?"#36D6A0":"var(--bd)"),background:ck?"#36D6A0":"transparent",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>{ck?"✓":""}</span>
          <span style={{fontSize:13,color:ck?"var(--mt)":"var(--txt)",textDecoration:ck?"line-through":"none"}}>{ln==="he"?c.he:c.en}</span>
        </button>;})}
      </div>}
    </main>

    <nav style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"var(--nav)",backdropFilter:"blur(16px)",borderTop:"1px solid var(--bd)",display:"flex",justifyContent:"space-around",padding:"6px 0 env(safe-area-inset-bottom,6px)"}}>
      {nav.map(function(n){return <button key={n.k} onClick={function(){setTab(n.k);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,background:"none",border:"none",cursor:"pointer",padding:"5px 12px",color:tab===n.k?"var(--ac)":"var(--mt)"}}><span style={{fontSize:20}}>{n.e}</span><span style={{fontSize:9,fontWeight:tab===n.k?700:500}}>{n.l}</span>{tab===n.k && <span style={{width:4,height:4,borderRadius:"50%",background:"var(--ac)"}} />}</button>;})}
    </nav>

    <Mod open={mod==="editT"} onClose={function(){setMod(null);}} title={t.editT} ch={<div>
      <Fld l={t.tName} ch={<Inp value={ln==="he"?tf.name:tf.nameEn} onChange={function(e){if(ln==="he")setTf(Object.assign({},tf,{name:e.target.value}));else setTf(Object.assign({},tf,{nameEn:e.target.value}));}} />} />
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Fld l={t.start} ch={<Inp type="date" value={tf.sd} onChange={function(e){setTf(Object.assign({},tf,{sd:e.target.value}));}} />} />
        <Fld l={t.stop} ch={<Inp type="date" value={tf.ed} onChange={function(e){setTf(Object.assign({},tf,{ed:e.target.value}));}} />} />
      </div>
      <Fld l={t.budget+" (₪)"} ch={<Inp type="number" value={tf.budget||0} onChange={function(e){setTf(Object.assign({},tf,{budget:parseFloat(e.target.value)||0}));}} />} />
      <Bt ch={t.save} fn={function(){var updates={name:tf.name||trip.name,nameEn:tf.nameEn||trip.nameEn,sd:tf.sd||trip.sd,ed:tf.ed||trip.ed,budget:tf.budget||0};fbDB.ref("trips/"+aId).update(updates);fbDB.ref("userTrips/"+myUid+"/"+aId).update({name:updates.name,nameEn:updates.nameEn});setMod(null);}} st={{width:"100%",justifyContent:"center",marginTop:6}} />
    </div>} />
  </div>;
}
