// ── Utils ──
function pSpent(exps,uid2){var t=0;for(var i=0;i<exps.length;i++){var e=exps[i];if(e.scope==="personal"&&e.paidBy===uid2)t+=toI(e.amount,e.currency);else if(e.scope==="shared"&&e.splitBetween.indexOf(uid2)>=0)t+=toI(e.amount/e.splitBetween.length,e.currency);}return t;}
function settle(exps,mems){var b={};mems.forEach(function(m){b[m.id]=0;});exps.filter(function(e){return e.scope==="shared";}).forEach(function(e){var s=e.amount/e.splitBetween.length;if(b[e.paidBy]!==undefined)b[e.paidBy]+=e.amount;e.splitBetween.forEach(function(u){if(b[u]!==undefined)b[u]-=s;});});var d=[],c=[];mems.forEach(function(m){var v=Math.round(b[m.id]*100)/100;if(v<-0.01)d.push({id:m.id,a:-v});if(v>0.01)c.push({id:m.id,a:v});});d.sort(function(a,b2){return b2.a-a.a;});c.sort(function(a,b2){return b2.a-a.a;});var r=[],di=0,ci=0;while(di<d.length&&ci<c.length){var t=Math.min(d[di].a,c[ci].a);if(t>0.01)r.push({from:d[di].id,to:c[ci].id,a:Math.round(t*100)/100});d[di].a-=t;c[ci].a-=t;if(d[di].a<0.01)di++;if(c[ci].a<0.01)ci++;}return r;}

}

function GMap(props){

      m.addListener("click",function(){iw.open(map,m);});mk.current.push(m);

    whs.forEach(function(p){

      var m=new google.maps.Marker({position:pos,map:map,label:{text:"♥",color:"#fff",fontWeight:"700"},icon:{path:google.maps.SymbolPath.CIRCLE,scale:11,fillColor:"#E84393",fillOpacity:1,strokeColor:"#fff",strokeWeight:2},title:lab});

    </div>
  </div>;

      <Bt ch={t.create} fn={function(){props.onCreate({id:uid(),name:f.name||f.nameEn||"Trip",nameEn:f.nameEn||f.name||"Trip",sd:f.sd||"2026-01-01",ed:f.ed||"",inv:Math.random().toString(36).substr(2,6).toUpperCase(),budget:0,mems:[{id:"u1",name:"אני",nameEn:"Me",av:"M",c:"#4F8CFF"}],cl:L.he.cl.map(function(c,i){return{id:"c"+i,he:c,en:L.en.cl[i],ck:{}};}),wl:[],itin:[{dn:1,dt:f.sd||"2026-01-01",items:[]}],exps:[]});setMod(false);}} st={{width:"100%",justifyContent:"center",marginTop:8}} />

  else if(trip.itin[mD]){trip.itin[mD].items.forEach(function(i){if(i.lat&&i.lng)mPts.push(Object.assign({},i));});}
  trip.wl.forEach(function(w){if(w.lat&&w.lng)mPts.push(Object.assign({},w,{isW:true}));});

          <button onClick={function(){var last=trip.itin[trip.itin.length-1];var nd=new Date(last.dt);nd.setDate(nd.getDate()+1);upd(Object.assign({},trip,{itin:trip.itin.concat([{dn:trip.itin.length+1,dt:nd.toISOString().split("T")[0],items:[]}])}));}} style={{flexShrink:0,padding:"7px 15px",borderRadius:10,border:"2px dashed var(--bd)",background:"transparent",color:"var(--mt)",cursor:"pointer",fontSize:14}}>+</button>

        </div>

        {fab(function(){setNe({desc:"",amount:"",currency:"EUR",paidBy:trip.mems[0].id,splitBetween:trip.mems.map(function(m){return m.id;}),scope:"shared"});setMod("addE");})}
        <Mod open={mod==="addE"} onClose={function(){setMod(null);}} title={t.add+" "+t.exp} ch={<div>

          </div>
          <Fld l={t.paid} ch={<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{trip.mems.map(function(m){return <button key={m.id} onClick={function(){setNe(Object.assign({},ne,{paidBy:m.id}));}} style={{padding:"6px 10px",borderRadius:8,border:ne.paidBy===m.id?"2px solid "+m.c:"1px solid var(--bd)",background:ne.paidBy===m.id?m.c+"18":"var(--sf)",color:ne.paidBy===m.id?m.c:"var(--mt)",cursor:"pointer",fontWeight:600,fontSize:11}}>{ln==="he"?m.name:m.nameEn}</button>;})}</div>} />
          <Bt ch={t.save} fn={function(){if(!ne.amount||!ne.desc)return;var ex=Object.assign({},ne,{id:uid(),amount:parseFloat(ne.amount),descEn:ne.desc,date:new Date().toISOString().split("T")[0],category:"attraction"});if(ex.scope==="personal")ex.splitBetween=[ex.paidBy];upd(Object.assign({},trip,{exps:trip.exps.concat([ex])}));setMod(null);}} st={{width:"100%",justifyContent:"center",marginTop:8}} />
        </div>} />
      </div>}

      {/* GROUP */}
      {tab==="group" && <div>
        <div style={{background:"linear-gradient(135deg,var(--gradA),var(--gradB))",borderRadius:14,padding:18,color:"#fff",marginBottom:14}}>
          <h2 style={{fontSize:17,fontWeight:800,color:"#fff",margin:"0 0 10px"}}>{ln==="he"?trip.name:trip.nameEn}</h2>
          <div style={{background:"rgba(255,255,255,.14)",borderRadius:8,padding:"7px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><p style={{fontSize:8,color:"rgba(255,255,255,.5)",margin:0}}>{t.invite}</p><p style={{fontSize:15,fontWeight:800,letterSpacing:3,color:"#fff",margin:0}}>{trip.inv}</p></div>
            <button onClick={function(){if(navigator.clipboard)navigator.clipboard.writeText(trip.inv);}} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:6,padding:"4px 8px",color:"#fff",cursor:"pointer",fontSize:10,fontWeight:600}}>{t.copy}</button>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <h3 style={{fontSize:14,fontWeight:700,color:"var(--txt)",margin:0}}>{t.mems} ({trip.mems.length})</h3>
          <button onClick={function(){setNm("");setMod("addM");}} style={{background:"var(--acSoft)",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",color:"var(--ac)",fontSize:10,fontWeight:600}}>+ {t.addM}</button>
        </div>
        {trip.mems.map(function(m){return <div key={m.id} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:10,padding:10,marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:34,height:34,borderRadius:"50%",background:m.c,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700}}>{m.av}</span>
          <div style={{flex:1}}><p style={{fontSize:13,fontWeight:700,color:"var(--txt)",margin:0}}>{ln==="he"?m.name:m.nameEn}</p><p style={{fontSize:9,color:"var(--mt)",margin:0}}>{money(Math.round(pSpent(trip.exps,m.id)),"ILS")} {t.spent}</p></div>
          {trip.mems.length>1 && <button onClick={function(){upd(Object.assign({},trip,{mems:trip.mems.filter(function(x){return x.id!==m.id;})}));}} style={{background:"none",border:"none",color:"var(--mt)",cursor:"pointer",opacity:.3,fontSize:12}}>🗑</button>}
        </div>;})}
        <Mod open={mod==="addM"} onClose={function(){setMod(null);}} title={t.addM} ch={<div>
          <Fld l={t.name} ch={<Inp value={nm} onChange={function(e){setNm(e.target.value);}} />} />
          <Bt ch={t.save} fn={function(){if(!nm)return;upd(Object.assign({},trip,{mems:trip.mems.concat([{id:uid(),name:nm,nameEn:nm,av:nm.charAt(0).toUpperCase(),c:MCOL[trip.mems.length%MCOL.length]}])}));setMod(null);}} st={{width:"100%",justifyContent:"center"}} />
        </div>} />
      </div>}

      {/* WISHLIST */}
      {tab==="wishlist" && <div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"var(--txt)",margin:0}}>❤️ {t.wish}</h2>
          <Bt ch={"+ "+t.addW} fn={function(){setNw({title:"",titleEn:"",location:"",lat:0,lng:0,notes:""});setMod("addW");}} st={{padding:"5px 10px",fontSize:10}} />
        </div>
        {trip.wl.length===0 && <p style={{textAlign:"center",padding:30,color:"var(--mt)"}}>✨ {t.noW}</p>}
        {trip.wl.map(function(w){return <div key={w.id} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:11,padding:11,marginBottom:7,borderRight:"3px solid #E84393"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><p style={{fontSize:13,fontWeight:600,color:"var(--txt)",margin:0}}>{ln==="he"?w.title:w.titleEn||w.title}</p><p style={{fontSize:10,color:"var(--mt)",margin:"2px 0 0"}}>📍 {w.location}</p></div>
            <div style={{display:"flex",gap:3}}>
              <button onClick={function(){setMvW(mvW===w.id?null:w.id);}} style={{background:"var(--acSoft)",border:"none",borderRadius:5,padding:"3px 7px",cursor:"pointer",color:"var(--ac)",fontSize:9,fontWeight:600}}>{t.move}</button>
              <button onClick={function(){upd(Object.assign({},trip,{wl:trip.wl.filter(function(x){return x.id!==w.id;})}));}} style={{background:"none",border:"none",color:"var(--mt)",cursor:"pointer",opacity:.3,fontSize:12}}>🗑</button>
            </div>
          </div>
          {mvW===w.id && <div style={{display:"flex",gap:4,marginTop:7,paddingTop:7,borderTop:"1px solid var(--bd)",flexWrap:"wrap"}}>
            {trip.itin.map(function(d,i){return <button key={i} onClick={function(){var ni=trip.itin.map(function(x){return Object.assign({},x,{items:x.items.slice()});});ni[i].items.push(Object.assign({},w,{id:uid(),time:"",endTime:"",documents:[]}));upd(Object.assign({},trip,{itin:ni,wl:trip.wl.filter(function(x){return x.id!==w.id;})}));setMvW(null);}} style={{padding:"5px 10px",borderRadius:6,border:"1px solid var(--bd)",background:"var(--sf)",cursor:"pointer",fontSize:10,fontWeight:600,color:"var(--txt)"}}>{t.day} {d.dn}</button>;})}
          </div>}
        </div>;})}
        <Mod open={mod==="addW"} onClose={function(){setMod(null);}} title={t.addW} ch={<div>
          <Fld l={t.title} ch={<Inp value={ln==="he"?nw.title:nw.titleEn} onChange={function(e){if(ln==="he")setNw(Object.assign({},nw,{title:e.target.value,titleEn:e.target.value}));else setNw(Object.assign({},nw,{titleEn:e.target.value,title:e.target.value}));}} />} />
          <Fld l={"📍 "+t.loc+" — Google Maps"} ch={<div>
            <PlIn val={nw.location} ph={t.search} onPick={function(loc){setNw(Object.assign({},nw,loc));}} />
            {nw.lat!==0 && <p style={{fontSize:9,color:"var(--ac)",marginTop:3}}>✓ {nw.location}</p>}
          </div>} />
          <Fld l={t.notes} ch={<Inp value={nw.notes} onChange={function(e){setNw(Object.assign({},nw,{notes:e.target.value}));}} />} />
          <Bt ch={t.save} fn={function(){if(!nw.title&&!nw.titleEn)return;upd(Object.assign({},trip,{wl:trip.wl.concat([Object.assign({},nw,{id:uid(),type:"attraction"})])}));setMod(null);}} st={{width:"100%",justifyContent:"center",marginTop:6}} />
        </div>} />
      </div>}

      {/* CHECKLIST */}
      {tab==="checklist" && <div>
        <h2 style={{fontSize:16,fontWeight:700,color:"var(--txt)",margin:"0 0 10px"}}>✅ {t.chk}</h2>
        <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:10}}>
          <span style={{fontSize:10,color:"var(--mt)",fontWeight:600}}>{t.view}</span>
          {trip.mems.map(function(m){return <button key={m.id} onClick={function(){setVA(m.id);}} style={{width:22,height:22,borderRadius:"50%",border:vA===m.id?"2px solid "+m.c:"2px solid transparent",background:m.c,color:"#fff",fontSize:8,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{m.av}</button>;})}
        </div>
        {trip.cl.map(function(c){var ck=c.ck&&c.ck[vA];return <button key={c.id} onClick={function(){var cl2=trip.cl.map(function(x){if(x.id!==c.id)return x;var ch=Object.assign({},x.ck);ch[vA]=!ch[vA];return Object.assign({},x,{ck:ch});});upd(Object.assign({},trip,{cl:cl2}));}} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"var(--card)",border:"1px solid var(--bd)",borderRadius:8,marginBottom:5,cursor:"pointer",textAlign:"inherit"}}>
          <span style={{width:22,height:22,borderRadius:6,border:"2px solid "+(ck?"#36D6A0":"var(--bd)"),background:ck?"#36D6A0":"transparent",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>{ck?"✓":""}</span>
          <span style={{fontSize:13,color:ck?"var(--mt)":"var(--txt)",textDecoration:ck?"line-through":"none"}}>{ln==="he"?c.he:c.en}</span>
        </button>;})}
      </div>}
    </main>

    {/* Nav */}
    <nav style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"var(--nav)",backdropFilter:"blur(16px)",borderTop:"1px solid var(--bd)",display:"flex",justifyContent:"space-around",padding:"6px 0 env(safe-area-inset-bottom,6px)"}}>
      {nav.map(function(n){return <button key={n.k} onClick={function(){setTab(n.k);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,background:"none",border:"none",cursor:"pointer",padding:"5px 12px",color:tab===n.k?"var(--ac)":"var(--mt)"}}><span style={{fontSize:20}}>{n.e}</span><span style={{fontSize:9,fontWeight:tab===n.k?700:500}}>{n.l}</span>{tab===n.k && <span style={{width:4,height:4,borderRadius:"50%",background:"var(--ac)"}} />}</button>;})}
    </nav>

    {/* Edit Trip */}
    <Mod open={mod==="editT"} onClose={function(){setMod(null);}} title={t.editT} ch={<div>
      <Fld l={t.tName} ch={<Inp value={ln==="he"?tf.name:tf.nameEn} onChange={function(e){if(ln==="he")setTf(Object.assign({},tf,{name:e.target.value}));else setTf(Object.assign({},tf,{nameEn:e.target.value}));}} />} />
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Fld l={t.start} ch={<Inp type="date" value={tf.sd} onChange={function(e){setTf(Object.assign({},tf,{sd:e.target.value}));}} />} />
        <Fld l={t.stop} ch={<Inp type="date" value={tf.ed} onChange={function(e){setTf(Object.assign({},tf,{ed:e.target.value}));}} />} />
      </div>
      <Fld l={t.budget+" (₪)"} ch={<Inp type="number" value={tf.budget||0} onChange={function(e){setTf(Object.assign({},tf,{budget:parseFloat(e.target.value)||0}));}} />} />
      <Bt ch={t.save} fn={function(){upd(Object.assign({},trip,tf));setMod(null);}} st={{width:"100%",justifyContent:"center",marginTop:6}} />
    </div>} />
  </div>;
}

/* ═══ ROOT APP ═══ */
function App(){
  var _ln=useState("he"),ln=_ln[0],setLn=_ln[1];
  var _trips=useState([mock()]),trips=_trips[0],setTrips=_trips[1];
  var _aId=useState(null),aId=_aId[0],setAId=_aId[1];

  var trip=null;
  for(var i=0;i<trips.length;i++){if(trips[i].id===aId){trip=trips[i];break;}}

  if(!trip) return <TripList trips={trips} onPick={function(id2){setAId(id2);}} onCreate={function(t2){setTrips(trips.concat([t2]));setAId(t2.id);}} ln={ln} setLn={setLn} />;

  return <TripView trip={trip} upd={function(u){setTrips(trips.map(function(t2){return t2.id===u.id?u:t2;}));}} onBack={function(){setAId(null);}} ln={ln} setLn={setLn} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
